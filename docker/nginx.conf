user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Definir tipos MIME explícitamente
    types {
        text/css css;
        text/javascript js;
        application/javascript js;
        image/svg+xml svg svgz;
        application/font-woff woff;
        application/font-woff2 woff2;
        application/vnd.ms-fontobject eot;
        font/truetype ttf;
        font/opentype otf;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ONTA Server Configuration
    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Denegar acceso a directorios sensibles (PRIMERO)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Denegar acceso a archivos .ht
        location ~ /\.ht {
            deny all;
        }

        # Archivos estáticos - servir DIRECTAMENTE PRIMERO
        # Esto DEBE estar antes que location /
        location ~* ^/css/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* ^/js/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* ^/img/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* ^/assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Rutas dinámicas - esto va AL FINAL
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP FastCGI
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }
}
