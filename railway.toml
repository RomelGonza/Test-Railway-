[build]
dockerfile = "Dockerfile"
buildCommand = "docker build -t onta:latest ."

[[services]]
name = "web"
dockerfile = "Dockerfile"
healthcheckPath = "/"
healthcheckInterval = 10
healthcheckTimeout = 5

[variables]
# Database
DB_HOST = ""
DB_USER = ""
DB_PASS = ""
DB_NAME = ""

# QR Configuration
QR_SECRET = ""

# Application
APP_ENV = "production"
APP_URL = ""
SITENAME = "ONTA Asistencia QR"

# reCAPTCHA (optional)
RECAPTCHA_SITE_KEY = ""
RECAPTCHA_SECRET_KEY = ""
